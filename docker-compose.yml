name: "calvora"

services:
  calvora:
    image: ghcr.io/sc00tz/calvora:latest
    container_name: calvora
    restart: unless-stopped
    ports:
      - "8092:3000"
    environment:
      - DAVIS_BASE_URL=http://davis:9000/dav
      - SESSION_SECRET=REPLACE_WITH_RANDOM_32_CHAR_STRING
      - PORT=3000
      - NODE_ENV=production
      - SESSION_PATH=/app/sessions
      # Public URL of your Davis server — shown in the DAVx5 setup guide.
      # This should point to Davis (not Calvora). Recommended setup:
      #   calendar.yourdomain.com  →  Calvora (this service, port 8092)
      #   dav.yourdomain.com       →  Davis   (port 8091)
      - DAVX5_SERVER_URL=https://dav.yourdomain.com
      # Set to 'false' if accessing over plain HTTP without a reverse proxy in front
      # - COOKIE_SECURE=false
    volumes:
      - calendar-sessions:/app/sessions
    networks:
      - database-network

volumes:
  calendar-sessions:

networks:
  database-network:
    external: true
